<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Design system — Galerie d'atoms (référence)</title>
    <link rel="stylesheet" href="./fonts.css" />
    <link rel="stylesheet" href="./tokens.css" />
    <style>
      /* Page de RÉFÉRENCE (pas une composition timée). Ouvre-la dans un
         navigateur pour voir tous les atoms du design system, puis copie le
         SVG/HTML qui t'intéresse dans ta composition HyperFrames. */
      body {
        background: var(--brand-bg);
        color: var(--brand-white);
        font-family: var(--brand-font-body);
        padding: 48px;
      }
      h1 { font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
      h2 {
        font-weight: 600; color: var(--brand-muted);
        margin: 40px 0 16px; font-size: 18px; text-transform: uppercase;
      }
      .grid { display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-end; }
      .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
      .item span { font-size: 13px; color: var(--brand-muted); }
      /* Les icônes SVG héritent la couleur via currentColor (jaune par défaut). */
      .icon { color: var(--brand-yellow); }
    </style>
  </head>
  <body>
    <h1>Design system — Atoms &amp; patterns</h1>

    <!-- ====================================================================
         ICÔNES — line-art SVG, stroke = currentColor (jaune par défaut).
         Portées depuis src/brand/icons.tsx + atoms.tsx (Remotion).
         ==================================================================== -->
    <h2>Icônes</h2>
    <div class="grid">
      <div class="item">
        <!-- Checkmark : anime stroke-dashoffset via BRAND.helpers.drawStroke -->
        <svg class="icon brand-check" width="64" height="64" viewBox="0 0 50 50" fill="none">
          <path d="M 10 26 L 21 37 L 40 13" stroke="currentColor" stroke-width="5"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Checkmark</span>
      </div>

      <div class="item">
        <!-- Cross : couleur négative (#ff5050), hors marque, usage compare -->
        <svg class="icon" style="color: var(--brand-negative)" width="64" height="64" viewBox="0 0 50 50" fill="none">
          <path d="M 14 14 L 36 36" stroke="currentColor" stroke-width="5" stroke-linecap="round" />
          <path d="M 36 14 L 14 36" stroke="currentColor" stroke-width="5" stroke-linecap="round" />
        </svg>
        <span>Cross</span>
      </div>

      <div class="item">
        <svg class="icon" width="64" height="64" viewBox="0 0 64 64" fill="none">
          <line x1="32" y1="10" x2="32" y2="54" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          <line x1="12" y1="18" x2="52" y2="18" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          <path d="M 6 36 L 12 18 L 18 36 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round" />
          <path d="M 46 36 L 52 18 L 58 36 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round" />
          <line x1="22" y1="54" x2="42" y2="54" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          <circle cx="32" cy="14" r="3" fill="currentColor" />
        </svg>
        <span>Balance</span>
      </div>

      <div class="item">
        <svg class="icon" width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect x="12" y="8" width="36" height="48" rx="3" stroke="currentColor" stroke-width="3" />
          <line x1="18" y1="20" x2="42" y2="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
          <line x1="18" y1="28" x2="38" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
          <line x1="18" y1="36" x2="42" y2="36" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
          <circle cx="46" cy="48" r="11" fill="currentColor" />
          <text x="46" y="52" text-anchor="middle" font-family="Poppins, sans-serif"
                font-weight="900" font-size="11" fill="var(--brand-bg)">RF</text>
        </svg>
        <span>DocStamp</span>
      </div>

      <div class="item">
        <svg class="icon" width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect x="8" y="14" width="48" height="42" rx="4" stroke="currentColor" stroke-width="3" />
          <line x1="8" y1="26" x2="56" y2="26" stroke="currentColor" stroke-width="3" />
          <line x1="20" y1="8" x2="20" y2="20" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          <line x1="44" y1="8" x2="44" y2="20" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          <circle cx="20" cy="38" r="2.5" fill="currentColor" />
          <circle cx="32" cy="38" r="2.5" fill="currentColor" />
          <circle cx="44" cy="38" r="2.5" fill="currentColor" />
          <circle cx="20" cy="48" r="2.5" fill="currentColor" />
          <circle cx="32" cy="48" r="2.5" fill="currentColor" />
        </svg>
        <span>Calendar</span>
      </div>

      <div class="item">
        <svg class="icon" width="64" height="64" viewBox="0 0 64 64" fill="none">
          <path d="M 10 12 L 10 52 L 32 56 L 32 16 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round" />
          <path d="M 54 12 L 54 52 L 32 56 L 32 16 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round" />
          <line x1="14" y1="22" x2="28" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <line x1="14" y1="30" x2="28" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <line x1="14" y1="38" x2="28" y2="40" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <line x1="36" y1="24" x2="50" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <line x1="36" y1="32" x2="50" y2="30" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <line x1="36" y1="40" x2="50" y2="38" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <span>Book</span>
      </div>
    </div>

    <!-- ====================================================================
         BLOC RF — symbole tricolore (drapeau FR), pas décoration.
         ==================================================================== -->
    <h2>Bloc RF</h2>
    <div class="grid">
      <div class="item">
        <div style="display:flex; height:80px; width:120px; border-radius:8px; overflow:hidden; box-shadow:0 4px 12px rgba(0,0,0,.3)">
          <div style="flex:1; background:#0055A4"></div>
          <div style="flex:1; background:#fff; display:flex; align-items:center; justify-content:center; font-family:Poppins,sans-serif; font-weight:900; font-size:34px; color:var(--brand-bg); letter-spacing:-1px">RF</div>
          <div style="flex:1; background:#EF4135"></div>
        </div>
        <span>BlocRF</span>
      </div>
    </div>

    <!-- ====================================================================
         PATTERNS MOTION — états statiques. Animation : voir motion.js.
         ==================================================================== -->
    <h2>Patterns motion</h2>
    <div class="grid">
      <div class="item">
        <div style="position:relative; width:160px; height:120px">
          <div class="brand-ghost" style="position:absolute; right:0; top:0">1</div>
        </div>
        <span>Ghost number</span>
      </div>

      <div class="item">
        <div class="brand-underline-wrap">
          <span class="brand-label" style="font-size:32px">DÉDUCTIBLE</span>
          <!-- en motion : width animée 0 -> mesure du mot -->
          <div class="brand-underline" style="width:100%"></div>
        </div>
        <span>Yellow underline</span>
      </div>

      <div class="item">
        <div class="brand-cutout" style="width:96px; height:96px">
          <span class="brand-meta">96</span>
        </div>
        <span>Circular cutout</span>
      </div>

      <div class="item">
        <div style="font-size:64px">💬</div>
        <span>Speech bubble</span>
      </div>
    </div>
  </body>
</html>
